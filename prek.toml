[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" },
    { id = "check-json" },
    { id = "check-yaml" },
    { id = "check-merge-conflict" },
    { id = "check-case-conflict" },
    { id = "check-executables-have-shebangs" },
    { id = "check-toml" },
    { id = "check-added-large-files" },
    { id = "detect-private-key" },
    { id = "mixed-line-ending" },
    { id = "fix-byte-order-marker" },
]


[[repos]]
repo = "local"
hooks = [
    { id = "cargo-fmt", name = "cargo fmt", entry = "cargo fmt --all --", language = "system", types = ["rust"], pass_filenames = false },
    { id = "cargo-clippy", name = "cargo clippy", entry = "cargo clippy --all-targets --all-features -- -D warnings", language = "system", types = ["rust"], pass_filenames = false },
    { id = "cargo-test", name = "cargo test", entry = "cargo test --all-targets --all-features", language = "system", types = ["rust"], pass_filenames = false }
]
