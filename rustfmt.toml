# rustfmt.toml

# Use Edition 2024 for both parsing and formatting rules
edition = "2024"
style_edition = "2024"

imports_layout = "Vertical"

# -------------------------
# Core Readability
# -------------------------
max_width = 72
use_small_heuristics = "Off"
use_field_init_shorthand = false

# -------------------------
# Import Organization
# -------------------------
imports_granularity = "Crate"
group_imports = "StdExternalCrate"

# -------------------------
# Comments and Documentation
# -------------------------
wrap_comments = true
comment_width = 68
format_code_in_doc_comments = true

# -------------------------
# Structural Organization
# -------------------------
reorder_impl_items = true
reorder_imports = true

# NOTE: Some of the features above (like comment wrapping and import grouping)
# are technically unstable in standard rustfmt. To use them, you may need to
# run `cargo +nightly fmt` and uncomment the line below:
unstable_features = true

combine_control_expr = false
condense_wildcard_suffixes = true
enum_discrim_align_threshold = 40
format_strings = true
hex_literal_case = "Upper"
normalize_comments = true
spaces_around_ranges = true
struct_field_align_threshold = 40
struct_lit_single_line = false
use_try_shorthand = true
chain_width = 10
match_arm_blocks = true
match_block_trailing_comma = true
fn_params_layout = "Vertical"
overflow_delimited_expr = false
